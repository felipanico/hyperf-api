services:
  hyperf-skeleton:
    container_name: hyperf-skeleton
    image: hyperf-skeleton
    build:
      dockerfile: dev.Dockerfile
      args:
        UID: 1000
        GID: 1000
    volumes:
      - ./:/opt/www
    ports:
      - 9501:9501
    environment:
      - APP_ENV=dev
      - SCAN_CACHEABLE=false
    depends_on:
      - mysql

  mysql:
    container_name: mysql-skeleton
    image: mysql:8
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: api_pix
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: docker
      MYSQL_PASSWORD: homestead
    ports:
      - 3306:3306
    volumes:
      - mysql_data:/var/lib/mysql

networks:
  default:
    name: hyperf-skeleton

volumes:
  mysql_data:
